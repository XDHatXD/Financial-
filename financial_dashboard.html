<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hybrid Finnhub Dashboard</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; }
h1 { margin-top: 20px; }
#status { margin-top: 10px; font-size: 16px; color: #38bdf8; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 40px auto; }
.card { background: #1e293b; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
.price { font-size: 22px; margin-top: 10px; color: #38bdf8; }
.change { font-size: 18px; margin-top: 5px; }
.up { color: #22c55e; }
.down { color: #ef4444; }
</style>
</head>
<body>

<h1>Hybrid Finnhub Dashboard</h1>
<div id="status">Connecting...</div>
<div class="grid" id="dashboard"></div>

<script>
const apiKey = "d6qqkmpr01qgdhqc0ol0d6qqkmpr01qgdhqc0olg";

// Assets
const cryptos = [
  {symbol:"BINANCE:BTCUSDT", name:"Bitcoin"},
  {symbol:"BINANCE:ETHUSDT", name:"Ethereum"},
  {symbol:"BINANCE:LTCUSDT", name:"Litecoin"}
];
const metalsStocksIndices = [
  {symbol:"XAUUSD", name:"Gold"},
  {symbol:"XAGUSD", name:"Silver"},
  {symbol:"XPTUSD", name:"Platinum"},
  {symbol:"INDEX:DJI", name:"DOW"},
  {symbol:"INDEX:IXIC", name:"NASDAQ"},
  {symbol:"INDEX:SPX", name:"S&P 500"},
  {symbol:"NYSE:VXUS", name:"VXUS"},
  {symbol:"NYSE:IAU", name:"IAU"},
  {symbol:"NASDAQ:IAUM", name:"IAUM"},
  {symbol:"NYSE:SLV", name:"SLV"},
  {symbol:"NASDAQ:TSLA", name:"TSLA"},
  {symbol:"NASDAQ:FSLR", name:"FSLR"},
  {symbol:"NYSE:CVX", name:"CVX"},
  {symbol:"NYSE:GD", name:"GD"},
  {symbol:"NASDAQ:GILD", name:"GILD"},
  {symbol:"NYSE:AIQ", name:"AIQ"},
  {symbol:"NYSE:SMH", name:"SMH"}
];
// Create dashboard cards
const dashboard = document.getElementById("dashboard");
[...cryptos, ...metalsStocksIndices].forEach(asset=>{
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<h3>${asset.name}</h3>
                    <div id="${asset.symbol}" class="price">--</div>
                    <div id="${asset.symbol}-change" class="change">--</div>`;
  dashboard.appendChild(card);
});

// ---------- WebSocket for cryptos ----------
const prevCryptoPrices = {};
const socket = new WebSocket(`wss://ws.finnhub.io?token=${apiKey}`);

socket.addEventListener('open', () => {
  document.getElementById("status").innerText = "Connected";
  cryptos.forEach(asset => {
    socket.send(JSON.stringify({type:"subscribe", symbol: asset.symbol}));
  });
});

socket.addEventListener('message', (event) => {
  let msg;
  try { msg = JSON.parse(event.data); } catch(e){ return; }
  if(msg.data){
    msg.data.forEach(trade=>{
      const symbol = trade.s;
      const price = parseFloat(trade.p).toFixed(2);
      const prev = prevCryptoPrices[symbol] || price;
      const change = parseFloat(((price-prev)/prev)*100).toFixed(2);
      prevCryptoPrices[symbol] = price;
      const priceEl = document.getElementById(symbol);
      const changeEl = document.getElementById(symbol+"-change");
      if(priceEl && changeEl){
        priceEl.innerText = "$"+price;
        changeEl.innerHTML = `<span class="${change>=0?'up':'down'}">${change}%</span>`;
      }
    });
  }
});

// ---------- REST API for metals/stocks/indices ----------
async function fetchREST(asset){
  try{
    const url = `https://finnhub.io/api/v1/quote?symbol=${asset.symbol}&token=${apiKey}`;
    const res = await fetch(url);
    const data = await res.json();
    if(data && data.c !== undefined){
      const price = parseFloat(data.c).toFixed(2);
      const change = data.pc ? parseFloat(((data.c - data.pc)/data.pc)*100).toFixed(2) : "--";
      document.getElementById(asset.symbol).innerText="$"+price;
      document.getElementById(asset.symbol+"-change").innerHTML = change==="--" ? "--" : `<span class="${change>=0?'up':'down'}">${change}%</span>`;
    } else {
      document.getElementById(asset.symbol).innerText="N/A";
      document.getElementById(asset.symbol+"-change").innerText="--";
    }
  } catch(e){
    console.error(`Error fetching ${asset.name}:`, e);
    document.getElementById(asset.symbol).innerText="Error";
    document.getElementById(asset.symbol+"-change").innerText="--";
  }
}

// Fetch all metals/stocks/indices every 60s
async function fetchAllREST(){
  for(const asset of metalsStocksIndices){
    await fetchREST(asset);
    await new Promise(r=>setTimeout(r, 200)); // 200ms delay to avoid throttling
  }
}
fetchAllREST();
setInterval(fetchAllREST, 60000);
</script>

</body>
</html>
